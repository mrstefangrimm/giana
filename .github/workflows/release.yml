name: Pack Release

on:
  workflow_run:
    workflows: ["CI"]
    types:
       - completed  
  push:
    paths:
      - "src/**"
    branches: [ "release/[0-9]+.[0-9]+.[0-9]+" ]
  pull_request:
    paths:
      - "src/**"
    branches: [ "release/[0-9]+.[0-9]+.[0-9]+" ]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set VERSION variable from tag
      run: echo "VERSION=${GITHUB_REF_NAME/release\/}" >> $GITHUB_ENV
    - name: Show VERSION
      run: echo "${VERSION}"
    - name: Pack API
      run: dotnet pack --configuration Release src/api/Giana.Api.csproj -p:Version=${VERSION} --output .
    - name: Pack APP
      run: dotnet pack --configuration Release src/app/Giana.App.csproj -p:Version=${VERSION} --output .
    - name: Push API
      run: dotnet nuget push Giana.Api.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.PUSH_NUGET }}
    - name: Push APP
      run: dotnet nuget push Giana.App.${VERSION}.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.PUSH_NUGET }}
