name: Dockerize Release

on:
  push:
    branches: [ "release/[0-9]+.[0-9]+.[0-9]+" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v5
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with: 
        dotnet-version: "10.0.x"
    - name: Set VERSION variable from tag
      run: |
        echo "VERSION=${GITHUB_REF_NAME/release\/}" >> $GITHUB_ENV
        echo "$VERSION"
    - name: Publish Cmd
      run: |
        dotnet restore src/app/cmd/Giana.App.Cmd.csproj
        dotnet publish src/app/cmd/Giana.App.Cmd.csproj -c Release -p:Version=${VERSION} -o publish
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./src/Dockerfile
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/giana:${{ env.VERSION }}


