name: Dockerize Release

on:
  push:
    # branches: [ "release/[0-9]+.[0-9]+.[0-9]+" ]
    paths: [ ".github/workflows/release-docker.yml" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with: 
        dotnet-version: "8.0.x"
    - name: Set VERSION variable from tag
      run: |
        echo "VERSION=${GITHUB_REF_NAME/release\/}" >> $GITHUB_ENV
        echo "${VERSION}"
    - name: Publish Cmd
      run: |
        dotnet restore src/app/cmd/Giana.App.Cmd.csproj -p:Version=${VERSION}
        dotnet publish src/app/cmd/Giana.App.Cmd.csproj -c Release -p:Version=${VERSION} -o publish
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Build and push Docker image
      uses: docker/build-push-action@v6
      with:
        context: ./src
        file: ./Dockerfile
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/giana:latest
          ${{ secrets.DOCKERHUB_USERNAME }}/giana:${{ github.sha }}


